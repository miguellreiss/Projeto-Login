<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="estilos/style.css" media="all">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div id="usuario">
                        <span id="icone-user"
                        class="material-symbols-outlined">person</span>
                        <input class="area-user" type="email" name="usuario" id="iusuario" required placeholder="Email" autocomplete="email">
                    </div>
                    <div id="senha">
                        <span id="icone-senha"  class="material-symbols-outlined">vpn_key</span>
                        <input class="area-senha" type="password" name="senha" id="isenha" required placeholder="Senha" autocomplete="current-password">
                    </div>

                    <div id="caixa-entrar">
                        <input id="botao-entrar" type="submit" value="Entrar">
                    </div>
                    <div id="esqueci-senha">
                        <a href="#">Esqueci a senha <span class="material-symbols-outlined">mail</span></a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
